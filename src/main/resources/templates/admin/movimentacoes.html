<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movimentações - FinUnity</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
	<link rel="stylesheet" th:href="@{/css/movimentacoes.css}">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="main">

        <!-- TOPBAR -->
        <div th:replace="fragments/topbar :: topbar"></div>

        <!-- CONTEÚDO -->
        <section class="content">

            <h2>Movimentações</h2>
			
			
			<div class="card">
			    <form method="get" 
				th:action="@{/admin/movimentacoes}"
                class="form-row">

			        <input type="text" name="descricao" placeholder="Descrição">

			        <input type="text" name="cliente" placeholder="Cliente">

			        <select name="tipo">
			            <option value="">Todos</option>
			            <option value="ENTRADA">Entrada</option>
			            <option value="SAIDA">Saída</option>
			        </select>

					<input type="date" name="dataInicio">
					<input type="date" name="dataFim">

			        <button type="submit">Filtrar</button>

			    </form>
			</div>

            <!-- FORMULÁRIO -->
            <div class="card">
                <form th:action="@{/admin/movimentacoes/salvar}"
                      th:object="${movimentacao}"
                      method="post">

                    <input type="hidden" th:field="*{id}">

                    <input type="text"
                           placeholder="Descrição"
                           th:field="*{descricao}" required>

                    <input type="number"
                           step="0.01"
                           placeholder="Valor"
                           th:field="*{valor}" required>

                    <select th:field="*{tipo}">
                        <option value="ENTRADA">Entrada</option>
                        <option value="SAIDA">Saída</option>
                    </select>

                    <input type="date"
                           th:field="*{data}" required>

                    <input type="text"
                           placeholder="Cliente"
                           th:field="*{cliente}">

                    <button type="submit">Salvar</button>
                </form>
            </div>

            <!-- TABELA -->
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Cliente</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mov : ${movimentacoes}">
                            <td th:text="${mov.data}"></td>
                            <td th:text="${mov.descricao}"></td>
                            <td th:text="${mov.cliente}"></td>
                            <td th:text="${mov.tipo}"></td>
                            <td th:text="'R$ ' + ${mov.valor}"></td>
                            <td>
                                <a th:href="@{/admin/movimentacoes/editar/{id}(id=${mov.id})}">
                                    Editar
                                </a>
                                |
                                <a th:href="@{/admin/movimentacoes/excluir/{id}(id=${mov.id})}">
                                    Excluir
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </div>
</div>

</body>
</html>
